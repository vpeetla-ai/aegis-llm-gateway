services:
  - type: web
    name: aegis-llm-gateway-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GATEWAY_MODE
        value: stub
      - key: CONTROL_PLANE_MODE
        value: demo
      - key: SEMANTIC_CACHE_URL
        sync: false
      - key: AGENTFINOPS_URL
        sync: false
      # Set GATEWAY_MODE=byok in Render dashboard and sync provider keys for live completions
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
